version: '3.8'

# TQDB Main Node - Cassandra Cluster
# This node stores ALL exchange data and acts as the seed node
# Deploy this on the main/master server

services:
  # Main Node - stores ALL exchange data (seed node)
  cassandra-main:
    image: cassandra:4.1.10
    container_name: tqdb-cassandra-main
    hostname: cassandra-main
    environment:
      - CASSANDRA_CLUSTER_NAME=tqdb_cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_NUM_TOKENS=256
      # IMPORTANT: Update with actual IPs of both nodes for better fault tolerance
      # Format: CASSANDRA_SEEDS=<MAIN_IP>,<CME_IP>
      - CASSANDRA_SEEDS=cassandra-main
      - CASSANDRA_BROADCAST_ADDRESS=cassandra-main
      - CASSANDRA_LISTEN_ADDRESS=auto
      - MAX_HEAP_SIZE=4G
      - HEAP_NEWSIZE=800M
    ports:
      - "9042:9042"  # CQL native transport
      - "7000:7000"  # Inter-node cluster communication
      - "7001:7001"  # TLS inter-node cluster communication
      - "7199:7199"  # JMX monitoring
      - "9160:9160"  # Thrift client API (legacy)
    volumes:
      - cassandra_main_data:/var/lib/cassandra
      - ./cassandra-config:/etc/cassandra
    networks:
      - tqdb_network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES;' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  cassandra_main_data:
    driver: local

networks:
  tqdb_network:
    driver: bridge
