# TQDB Cassandra Database - Single Node
# Standalone Cassandra instance for TQDB time-series data storage

services:
  cassandra:
    image: cassandra:4.1.10
    container_name: tqdb-cassandra
    hostname: cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=tqdb_single_node
      - MAX_HEAP_SIZE=1536M
      - HEAP_NEWSIZE=400M
      - CASSANDRA_AUTHENTICATOR=PasswordAuthenticator
      - CASSANDRA_AUTHORIZER=CassandraAuthorizer
      - CASSANDRA_USER=tqdb
      - CASSANDRA_PASSWORD=tqdb1234
    ports:
      - "9042:9042"  # CQL native transport
      - "7199:7199"  # JMX monitoring (optional)
    volumes:
      - ./data:/var/lib/cassandra
      #- ./cassandra.yaml:/etc/cassandra/cassandra.yaml
    networks:
      - tqdb_network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -u tqdb -p tqdb1234 -e 'DESCRIBE KEYSPACES;' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

networks:
  tqdb_network:
    driver: bridge
