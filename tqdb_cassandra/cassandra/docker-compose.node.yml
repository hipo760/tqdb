version: '3.8'

# TQDB Exchange Node - Cassandra Cluster
# This node stores ONLY its specific exchange data
# Deploy this on any exchange server (CME, NYSE, NASDAQ, etc.)

services:
  # Exchange Node - stores exchange-specific data only
  cassandra-node:
    image: cassandra:4.1.10
    container_name: tqdb-cassandra-node
    hostname: cassandra-node
    environment:
      - CASSANDRA_CLUSTER_NAME=tqdb_cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack2
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_NUM_TOKENS=256
      # IMPORTANT: Update with actual IPs of both nodes for better fault tolerance
      # Format: CASSANDRA_SEEDS=<MAIN_IP>,<NODE_IP>
      # This allows exchange node to work even if main node is down
      - CASSANDRA_SEEDS=<MAIN_SERVER_IP>,<NODE_SERVER_IP>
      - CASSANDRA_BROADCAST_ADDRESS=cassandra-node
      - CASSANDRA_LISTEN_ADDRESS=auto
      - MAX_HEAP_SIZE=1536M
      - HEAP_NEWSIZE=400M
    ports:
      - "9042:9042"  # CQL native transport
      - "7000:7000"  # Inter-node cluster communication
      - "7001:7001"  # TLS inter-node cluster communication
      - "7199:7199"  # JMX monitoring
    volumes:
      - ./data:/var/lib/cassandra
      #- ./cassandra.yaml:/etc/cassandra/cassandra.yaml
    networks:
      - tqdb_network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES;' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

networks:
  tqdb_network:
    driver: bridge
