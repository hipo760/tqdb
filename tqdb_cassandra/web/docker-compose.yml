services:
  tqdb-web:
    build:
      context: ../
      dockerfile: web/Dockerfile
    container_name: tqdb-web
    hostname: tqdb-web
    
    # Environment variables for configuration
    environment:
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=9042
      - CASSANDRA_KEYSPACE=tqdb1
      - CASSANDRA_USER=tqdb
      - CASSANDRA_PASSWORD=tqdb1234
      - TOOLS_DIR=/opt/tqdb/tools
      - TAIFEX_HOLIDAY_CSV=/opt/tqdb/feature-custom-symbol/TAIFEX/taifex_holidays_sample.csv
      - TZ=UTC
      - WAIT_FOR_CASSANDRA=true
      - TQDB_ENDPOINT_LOGGING=true
      - TQDB_LOG_DIR=/var/log/apache2
    
    # Volumes for persistent data
    volumes:
      # Persist endpoint usage logs
      - ./logs:/var/log/apache2
    
    # Expose HTTP port
    ports:
      - "2380:80"
    
    # Connect to external network where Cassandra is running
    networks:
      - tqdb_network
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

# Use network created by Cassandra compose file
networks:
  tqdb_network:
    external: true
    name: cassandra_tqdb_network
