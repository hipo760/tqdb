# TQDB Apache Configuration
# Replaces /etc/apache2/sites-available/tqdb.conf

<VirtualHost *:80>
    ServerAdmin admin@tqdb.local
    ServerName tqdb-web
    DocumentRoot /var/www/html

    # Error and Access logs
    ErrorLog ${APACHE_LOG_DIR}/tqdb-error.log
    CustomLog ${APACHE_LOG_DIR}/tqdb-access.log combined
    
    # Log level (can be changed via environment variable)
    LogLevel warn

    # CGI Scripts Directory
    ScriptAlias /cgi-bin/ /var/www/cgi-bin/
    <Directory /var/www/cgi-bin>
        Options +ExecCGI
        AddHandler cgi-script .py
        AllowOverride None
        Require all granted
        
        # Pass environment variables to CGI scripts
        SetEnv CASSANDRA_HOST ${CASSANDRA_HOST}
        SetEnv CASSANDRA_PORT ${CASSANDRA_PORT}
        SetEnv CASSANDRA_KEYSPACE ${CASSANDRA_KEYSPACE}
        SetEnv TOOLS_DIR ${TOOLS_DIR}
    </Directory>

    # Static HTML/CSS/JS files
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Enable CORS for API calls (if needed)
        # Header set Access-Control-Allow-Origin "*"
        
        # Cache static assets
        <FilesMatch "\.(jpg|jpeg|png|gif|css|js|ico)$">
            Header set Cache-Control "max-age=86400, public"
        </FilesMatch>
    </Directory>

    # Default directory index
    DirectoryIndex index.html index.htm

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    # Compress text files
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

</VirtualHost>

